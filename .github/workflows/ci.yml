name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files need gofmt -s:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
          args: --timeout=5m

      - name: buf lint
        uses: bufbuild/buf-action@v1
        with:
          input: proto
          setup_only: false
          lint: true
          format: false
          breaking: false
          push: false

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vendex
          POSTGRES_PASSWORD: vendex
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vendex"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Create per-service test databases
        env:
          PGPASSWORD: vendex
        run: |
          psql -h localhost -U vendex -d postgres -c "CREATE DATABASE auth_test_db"
          psql -h localhost -U vendex -d postgres -c "CREATE DATABASE card_catalog_test_db"

      - name: Run integration tests
        env:
          AUTH_TEST_DATABASE_URL:          "postgres://vendex:vendex@localhost:5432/auth_test_db?sslmode=disable"
          CARD_CATALOG_TEST_DATABASE_URL:  "postgres://vendex:vendex@localhost:5432/card_catalog_test_db?sslmode=disable"
        run: go test -race -count=1 -tags integration ./...

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build auth image
        run: docker build -f services/auth/Dockerfile -t vendex/auth:ci .

      - name: Build card-catalog image
        run: docker build -f services/card-catalog/Dockerfile -t vendex/card-catalog:ci .
