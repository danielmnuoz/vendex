name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify (compile + unit + integration tests)
        # Testcontainers spins up Postgres on-demand via the Docker socket
        # provided by the GitHub Actions runner — no need for a `services:`
        # block.
        run: mvn --batch-mode --no-transfer-progress verify
