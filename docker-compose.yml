name: vendex

services:
  postgres:
    image: postgres:16-alpine
    container_name: vendex-postgres
    environment:
      POSTGRES_USER: vendex
      POSTGRES_PASSWORD: vendex
      POSTGRES_MULTIPLE_DATABASES: auth_db,card_catalog_db,event_db,inventory_db,buylist_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vendex-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redpanda: a single-binary, Kafka-API-compatible broker (no ZooKeeper).
  # Two listeners: `internal` for in-network services (redpanda:9092) and
  # `external` for clients on the host (localhost:19092). Phase 2 services
  # connect over the internal listener; you'd point a local IDE or `rpk` at
  # the external one.
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: vendex-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"   # Kafka API (host access)
      - "9644:9644"     # Admin API / metrics
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Web UI for browsing topics and inspecting the JSON event payloads our
  # services publish. Handy while building Phase 2 producers; not required
  # by any service. Visit http://localhost:8080.
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: vendex-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: vendex-auth
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: vendex
      SPRING_DATASOURCE_PASSWORD: vendex
      AUTH_JWT_ISSUER: https://auth.vendex.local
      AUTH_JWT_ACCESS_TOKEN_TTL: PT15M
      AUTH_JWT_REFRESH_TOKEN_TTL: P7D
      # Local-dev only. Decodes to exactly 32 bytes (AES-256). Override in any
      # real environment. Generate a fresh one with: openssl rand -base64 32
      AUTH_CRYPTO_ENCRYPTION_KEY: ${AUTH_CRYPTO_ENCRYPTION_KEY:-V3wOAnq3+Jus93WFJbWJD6ZKmzCssr2xYMi/aVfxZD8=}
      GRPC_SERVER_PORT: 9090
    ports:
      - "9090:9090"
    restart: unless-stopped

  card-catalog:
    build:
      context: .
      dockerfile: services/card-catalog/Dockerfile
    container_name: vendex-card-catalog
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/card_catalog_db
      SPRING_DATASOURCE_USERNAME: vendex
      SPRING_DATASOURCE_PASSWORD: vendex
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GRPC_SERVER_PORT: 9090
    ports:
      - "9091:9090"
    restart: unless-stopped

volumes:
  postgres-data:
