syntax = "proto3";

package vendex.cards.v1;

option java_package = "com.vendex.cards.v1";
option java_multiple_files = true;

// CardCatalogService is the read API over our mirror of the Pokemon TCG
// card catalog. Card data is seeded once per environment from TCGdex
// (see services/card-catalog/.../SeedRunner.java) and re-synced via a
// separate cron / admin path tracked in issue #2 — every read request hits
// our local Postgres + Redis, never the upstream API.
service CardCatalogService {
  rpc SearchCards(SearchCardsRequest) returns (SearchCardsResponse);
  rpc GetCardById(GetCardByIdRequest) returns (GetCardByIdResponse);
  rpc GetCardsByIds(GetCardsByIdsRequest) returns (GetCardsByIdsResponse);
  rpc ListSets(ListSetsRequest) returns (ListSetsResponse);
}

message Card {
  string id = 1;              // Internal UUID
  string external_id = 2;     // TCGdex card ID (e.g. "sv03-001")
  string name = 3;
  string set_id = 4;          // TCGdex set ID (e.g. "sv03")
  string set_name = 5;
  string set_series = 6;      // Optional, may be empty until backfilled
  string rarity = 7;          // Optional
  string image_url = 8;       // Small/low-res
  string image_url_large = 9; // High-res
  string release_date = 10;   // ISO date string, optional
}

message SetSummary {
  string id = 1;          // TCGdex set ID
  string name = 2;
  string series = 3;      // Optional
  int32 card_count = 4;   // Number of cards we know about in this set
}

message SearchCardsRequest {
  string query = 1;
  string set_id_filter = 2;
  string rarity_filter = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message SearchCardsResponse {
  repeated Card cards = 1;
  string next_page_token = 2;
}

message GetCardByIdRequest {
  string card_id = 1;
}

message GetCardByIdResponse {
  Card card = 1;
}

message GetCardsByIdsRequest {
  repeated string card_ids = 1;
}

message GetCardsByIdsResponse {
  repeated Card cards = 1;
}

message ListSetsRequest {}

message ListSetsResponse {
  repeated SetSummary sets = 1;
}
