spring:
  application:
    name: auth
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:vendex}
    password: ${SPRING_DATASOURCE_PASSWORD:vendex}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
  main:
    web-application-type: none   # No embedded servlet container; gRPC is the wire protocol.
    banner-mode: off

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

auth:
  jwt:
    issuer: ${AUTH_JWT_ISSUER:https://auth.vendex.local}
    access-token-ttl: ${AUTH_JWT_ACCESS_TOKEN_TTL:PT15M}        # ISO-8601 duration: 15 minutes
    refresh-token-ttl: ${AUTH_JWT_REFRESH_TOKEN_TTL:P7D}         # 7 days
  bcrypt:
    # Cost 12 ~= 200ms per hash on modern hardware. Tunable per environment if
    # CPU budget gets tight. Stored hashes encode the cost themselves so old
    # hashes keep verifying when cost changes.
    cost: ${AUTH_BCRYPT_COST:12}
  crypto:
    # Base64-encoded 32-byte (AES-256) key used to encrypt signing-key private
    # halves at rest. Generate with:
    #   openssl rand -base64 32
    # MUST be set in any environment that persists signing keys.
    encryption-key: ${AUTH_CRYPTO_ENCRYPTION_KEY:}

logging:
  level:
    com.vendex: INFO
    org.springframework.jdbc.core: WARN
